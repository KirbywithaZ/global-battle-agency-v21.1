<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GBA | Developer Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: radial-gradient(circle at top left, #1a1a2e, #16213e); min-height: 100vh; color: white; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="app" class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-bold tracking-tight text-blue-400">Global Battle Agency</h1>
                <p class="text-slate-400">Mystery Gift Management Portal</p>
            </div>
            <div id="statusIndicator" class="px-3 py-1 rounded-full text-xs bg-red-900/30 text-red-400 border border-red-500/50">Disconnected</div>
        </header>

        <div id="authSection" class="glass p-8 rounded-2xl shadow-xl max-w-md mx-auto">
            <h2 class="text-xl font-semibold mb-4">Developer Login</h2>
            <p class="text-sm text-slate-400 mb-6">Enter your Developer Username to manage your gifts.</p>
            <input type="text" id="devUsername" placeholder="Username" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 mb-4 focus:ring-2 focus:ring-blue-500 outline-none">
            <button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-500 transition-colors font-bold py-3 rounded-lg">Access Dashboard</button>
        </div>

        <div id="dashboardSection" class="hidden space-y-8">
            
            <div class="glass p-6 rounded-2xl">
                <h2 class="text-xl font-semibold mb-4 text-blue-300">Create New Mystery Gift</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1 uppercase">Gift Code</label>
                        <input type="text" id="giftCode" placeholder="e.g. PIKACHU2026" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 outline-none focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1 uppercase">Marshal Data (From Console)</label>
                        <input type="text" id="giftData" placeholder="Paste encoded string..." class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 outline-none focus:border-blue-500">
                    </div>
                </div>
                <button onclick="uploadGift()" class="mt-4 bg-green-600 hover:bg-green-500 px-6 py-2 rounded-lg font-bold transition-all">Publish Gift</button>
            </div>

            <div class="glass rounded-2xl overflow-hidden">
                <div class="p-6 border-b border-white/10">
                    <h2 class="text-xl font-semibold">Active Live-Gifts</h2>
                </div>
                <table class="w-full text-left">
                    <thead class="bg-white/5 text-slate-400 text-sm">
                        <tr>
                            <th class="p-4">Code / ID</th>
                            <th class="p-4">Data Preview</th>
                            <th class="p-4 text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody id="giftTableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // CONFIG - Replace these with your actual Supabase details
        const SUPABASE_URL = 'YOUR_SUPABASE_URL';
        const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentDev = "";

        async function login() {
            const user = document.getElementById('devUsername').value;
            if (user.length < 3) return alert("Enter a valid username.");
            
            currentDev = user;
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('dashboardSection').classList.remove('hidden');
            document.getElementById('statusIndicator').innerText = `Logged in as: ${user}`;
            document.getElementById('statusIndicator').className = "px-3 py-1 rounded-full text-xs bg-green-900/30 text-green-400 border border-green-500/50";
            
            loadGifts();
        }

        async function uploadGift() {
            const id = document.getElementById('giftCode').value.toUpperCase();
            const data = document.getElementById('giftData').value;

            if (!id || !data) return alert("Fill in all fields!");

            const { error } = await supabase
                .from('gba_storage')
                .upsert({ id: id, data: data, dev_owner: currentDev });

            if (error) {
                alert("Error: " + error.message);
            } else {
                alert("Gift successfully uploaded!");
                document.getElementById('giftCode').value = "";
                document.getElementById('giftData').value = "";
                loadGifts();
            }
        }

        async function loadGifts() {
            const { data, error } = await supabase
                .from('gba_storage')
                .select('*')
                .eq('dev_owner', currentDev);

            const tbody = document.getElementById('giftTableBody');
            tbody.innerHTML = "";

            if (data) {
                data.forEach(gift => {
                    tbody.innerHTML += `
                        <tr class="border-b border-white/5 hover:bg-white/5 transition-colors">
                            <td class="p-4 font-mono text-blue-400">${gift.id}</td>
                            <td class="p-4 text-slate-500 text-xs truncate max-w-[200px]">${gift.data}</td>
                            <td class="p-4 text-right">
                                <button onclick="deleteGift('${gift.id}')" class="text-red-400 hover:text-red-200 text-sm font-semibold">Revoke</button>
                            </td>
                        </tr>
                    `;
                });
            }
        }

        async function deleteGift(id) {
            if (!confirm(`Delete gift ${id}?`)) return;
            await supabase.from('gba_storage').delete().eq('id', id);
            loadGifts();
        }
    </script>
</body>
</html>
