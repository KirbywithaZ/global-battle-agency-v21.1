<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GBA | Global Battle Agency</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { background: linear-gradient(90deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="p-6 flex justify-between items-center max-w-6xl mx-auto">
        <div class="text-2xl font-bold gradient-text cursor-pointer" onclick="showPage('landing')">GBA.Network</div>
        <div id="navActions">
            <button onclick="showPage('login')" class="text-slate-300 hover:text-white mr-4">Login</button>
            <button onclick="showPage('register')" class="bg-blue-600 px-4 py-2 rounded-lg font-bold hover:bg-blue-500">Join Agency</button>
        </div>
        <div id="navUser" class="hidden flex items-center gap-4">
            <span id="displayUser" class="text-blue-400 font-mono"></span>
            <button onclick="logout()" class="text-xs text-slate-500 hover:text-red-400 underline">Logout</button>
        </div>
    </nav>

    <section id="page-landing" class="max-w-4xl mx-auto py-20 px-6 text-center">
        <h1 class="text-5xl md:text-7xl font-extrabold mb-6">Connect Your <span class="gradient-text">Essentials</span> Game.</h1>
        <p class="text-slate-400 text-xl mb-10">Cloud infrastructure for Pokémon Essentials v20/v21.</p>
        <div class="flex flex-wrap justify-center gap-4">
            <button onclick="showPage('register')" class="bg-white text-black px-8 py-3 rounded-full font-bold text-lg hover:bg-slate-200">Get Started</button>
        </div>
    </section>

    <section id="page-login" class="hidden max-w-md mx-auto py-20 px-6">
        <div class="glass p-8 rounded-3xl">
            <h2 class="text-2xl font-bold mb-6 text-center">Developer Login</h2>
            <input type="text" id="loginUser" placeholder="Username" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 mb-4 outline-none focus:border-blue-500">
            <button onclick="handleLogin()" class="w-full bg-blue-600 py-4 rounded-xl font-bold hover:bg-blue-500">Login</button>
        </div>
    </section>

    <section id="page-register" class="hidden max-w-md mx-auto py-20 px-6">
        <div class="glass p-8 rounded-3xl">
            <h2 class="text-2xl font-bold mb-6 text-center">Register</h2>
            <input type="text" id="regUser" placeholder="Desired Username" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 mb-4 outline-none focus:border-green-500">
            <button onclick="handleRegister()" class="w-full bg-green-600 py-4 rounded-xl font-bold hover:bg-green-500">Create Account</button>
        </div>
    </section>

    <section id="page-dashboard" class="hidden max-w-5xl mx-auto py-10 px-6">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1">
                <div class="glass p-6 rounded-2xl">
                    <h3 class="text-lg font-bold mb-4">Create Mystery Gift</h3>
                    <input type="text" id="giftCode" placeholder="GIFT_CODE" class="w-full bg-slate-900 border border-slate-800 rounded-lg p-3 mb-3 text-sm uppercase outline-none">
                    <textarea id="giftData" rows="4" placeholder="Paste Marshal String..." class="w-full bg-slate-900 border border-slate-800 rounded-lg p-3 mb-3 text-xs outline-none"></textarea>
                    <button onclick="uploadGift()" class="w-full bg-blue-600 py-2 rounded-lg font-bold text-sm">Deploy</button>
                </div>
            </div>
            <div class="lg:col-span-2">
                <div class="glass rounded-2xl overflow-hidden">
                    <div class="p-6 bg-white/5 border-b border-white/5">
                        <h3 class="font-bold">Active Live-Gifts</h3>
                    </div>
                    <div id="giftList" class="divide-y divide-white/5"></div>
                </div>
            </div>
        </div>
    </section>

    <script>
        // Use unique variable names to avoid "Already declared" errors
        const S_URL = 'YOUR_SUPABASE_URL';
        const S_KEY = 'YOUR_SUPABASE_ANON_KEY';
        const gbaClient = supabase.createClient(S_URL, S_KEY);

        let currentUser = localStorage.getItem('gba_user');

        function showPage(pageId) {
            console.log("Navigating to:", pageId);
            const pages = ['landing', 'login', 'register', 'dashboard'];
            pages.forEach(p => {
                const el = document.getElementById(`page-${p}`);
                if (el) el.classList.add('hidden');
            });
            document.getElementById(`page-${pageId}`).classList.remove('hidden');
            
            if (pageId === 'dashboard') loadGifts();
        }

        async function handleRegister() {
            const user = document.getElementById('regUser').value.trim().toLowerCase();
            if (user.length < 3) return alert("Username too short.");

            const { error } = await gbaClient.from('gba_devs').insert([{ username: user }]);
            if (error) return alert("Error: Username might be taken.");
            
            loginSuccess(user);
        }

        async function handleLogin() {
            const user = document.getElementById('loginUser').value.trim().toLowerCase();
            const { data, error } = await gbaClient.from('gba_devs').select('*').eq('username', user).single();
            
            if (!data || error) return alert("User not found.");
            loginSuccess(user);
        }

        function loginSuccess(user) {
            currentUser = user;
            localStorage.setItem('gba_user', user);
            document.getElementById('navActions').classList.add('hidden');
            document.getElementById('navUser').classList.remove('hidden');
            document.getElementById('displayUser').innerText = user;
            showPage('dashboard');
        }

        function logout() {
            localStorage.removeItem('gba_user');
            window.location.reload();
        }

        async function uploadGift() {
            const id = document.getElementById('giftCode').value.toUpperCase().trim();
            const data = document.getElementById('giftData').value.trim();
            if (!id || !data) return alert("Fill all fields");

            const { error } = await gbaClient.from('gba_storage').upsert({ 
                id: id, 
                data: data, 
                dev_owner: currentUser 
            });

            if (error) alert(error.message);
            else {
                document.getElementById('giftCode').value = "";
                document.getElementById('giftData').value = "";
                loadGifts();
            }
        }

        async function loadGifts() {
            const { data } = await gbaClient.from('gba_storage').select('*').eq('dev_owner', currentUser);
            const list = document.getElementById('giftList');
            list.innerHTML = '';
            
            if (!data || data.length === 0) {
                list.innerHTML = '<p class="p-10 text-center text-slate-500">No active gifts.</p>';
                return;
            }

            data.forEach(gift => {
                const item = document.createElement('div');
                item.className = "p-4 flex justify-between items-center hover:bg-white/5";
                item.innerHTML = `
                    <div>
                        <div class="font-bold text-blue-400">${gift.id}</div>
                        <div class="text-xs text-slate-500 truncate w-48">${gift.data}</div>
                    </div>
                    <button onclick="deleteGift('${gift.id}')" class="text-red-500 text-xs font-bold hover:underline">Revoke</button>
                `;
                list.appendChild(item);
            });
        }

        async function deleteGift(id) {
            if (confirm(`Revoke gift ${id}?`)) {
                await gbaClient.from('gba_storage').delete().eq('id', id);
                loadGifts();
            }
        }

        // Run on load
        window.onload = () => {
            if (currentUser) loginSuccess(currentUser);
            else showPage('landing');
        };
    </script>
</body>
</html>
